<!DOCTYPE html>
<html>
<head>
  <title>My VTT</title>
  <style>
    body { margin: 0; background: #1a1a2e; }
    canvas { display: block; cursor: crosshair; }

    #canvas-setup-overlay,
    #waiting-screen {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        z-index: 3000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
    }

    #canvas-setup-overlay > div {
        background: #1a1a2e;
        border: 1px solid #444466;
        border-radius: 10px;
        padding: 28px 32px;
        min-width: 320px;
        max-width: 460px;
        max-height: 90vh;
        overflow-y: auto;
        color: white;
    }

    #role-indicator {
        position: fixed;
        top: 12px;
        right: 12px;
        color: white;
        font-family: sans-serif;
        font-size: 13px;
        font-weight: bold;
        padding: 5px 12px;
        border-radius: 20px;
        z-index: 2000;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #333355;
        user-select: none;
    }

    .vtt-upload-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        border: 2px dashed #444466;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: #9090aa;
        gap: 8px;
        transition: border-color 0.15s;
    }
    .vtt-upload-zone:hover {
        border-color: #7c3aed;
        color: #c4b5fd;
    }

    /* ── Shape panel ────────────────────────────────────────────────────────── */

    /*
     * Fixed panel anchored to the vertical center of the right edge.
     * z-index 500 keeps it above the canvas but below token menus (1000)
     * and overlays (3000).
     */
    #shape-panel {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: #1a1a2e;
        border: 1px solid #444466;
        border-right: none;
        border-radius: 8px 0 0 8px;
        padding: 10px 8px 12px;
        z-index: 500;
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: 76px;
        font-family: sans-serif;
        user-select: none;
        box-shadow: -2px 0 12px rgba(0, 0, 0, 0.5);
    }

    .shape-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        background: #2a2a3e;
        color: #c0c0d8;
        border: 1px solid #444466;
        border-radius: 6px;
        padding: 7px 4px 5px;
        cursor: pointer;
        font-size: 11px;
        font-family: sans-serif;
        line-height: 1;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        width: 100%;
    }

    .shape-btn:hover {
        background: #35355a;
        border-color: #7c3aed;
        color: #e0e0ff;
    }

    /*
     * Active state: the currently selected shape tool gets a purple tint
     * so the user always knows which mode they're in.
     */
    .shape-btn.active {
        background: rgba(124, 58, 237, 0.25);
        border-color: #7c3aed;
        color: #c4b5fd;
    }

    .shape-icon {
        font-size: 18px;
        line-height: 1;
    }
  </style>
</head>
<body>

  <!-- Role indicator — populated by applyClientRole() in canvas.js -->
  <div id="role-indicator"></div>

  <!--
    The canvas has no hardcoded width/height attributes.
    Pixel dimensions are set exclusively by applyCanvasSize() in canvas.js,
    which is called after the admin configures the grid (or when a player joins
    a session that is already configured). Before setup completes the canvas is
    invisible behind the setup/waiting overlay.
  -->
  <canvas id="gameCanvas"></canvas>

  <!--
    network.js must load before canvas.js because canvas.js calls functions
    declared in network.js (sendTokenPlace, sendCanvasSize, uploadImage, etc.)
    and reads variables owned by network.js (clientID, clientRole, tokenImageCache).
  -->
  <script src="network.js"></script>
  <script src="canvas.js"></script>
</body>
</html>
